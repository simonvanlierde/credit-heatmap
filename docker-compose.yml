services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--input-type=module",
          "-e",
          "const res = await fetch('http://127.0.0.1:3000/health'); if (!res.ok) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
