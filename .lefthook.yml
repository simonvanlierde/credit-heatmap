pre-commit:
    parallel: true
    commands:
        biome:
            glob: "*.{js,ts,tsx,jsx,json,md,css,scss,html}"
            run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
            stage_fixed: true
        cspell:
            glob: "*.{md,txt}"
            run: pnpm cspell --no-progress {staged_files}
commit-msg:
    commands:
        commitlint:
            run: npx --no-install commitlint --edit $1
            root: .

pre-push:
    commands:
        lint:
            run: pnpm lint
            root: .
        test:
            run: pnpm test
            root: .
