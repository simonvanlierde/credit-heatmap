name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compose:
    name: Compose config and smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate dev compose
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/dev/null

      - name: Validate prod compose
        run: CLOUDFLARE_TUNNEL_TOKEN=dummy docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/dev/null

      - name: Build and start the stack
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

      - name: Smoke test (health + page)
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${NGINX_PORT:-8080}/health" >/dev/null \
              && curl -fsS "http://127.0.0.1:${NGINX_PORT:-8080}/" >/dev/null; then
              echo "Docker smoke test passed."
              exit 0
            fi
            sleep 2
          done
          echo "Docker smoke test failed."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --no-color
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down -v --remove-orphans
