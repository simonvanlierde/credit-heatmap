name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compose:
    name: Compose config and smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config >/dev/null

      - name: Build and start the container
        run: docker compose up -d --build

      - name: Smoke test (health + page)
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/health" >/dev/null \
              && curl -fsS "http://127.0.0.1:3000/" >/dev/null; then
              echo "Docker smoke test passed."
              exit 0
            fi
            sleep 2
          done
          echo "Docker smoke test failed."
          docker compose logs --no-color
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
