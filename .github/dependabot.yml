version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /packages/core
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: [ "*" ]
    cooldown:
      default-days: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: [ "*" ]
    cooldown:
      default-days: 3
